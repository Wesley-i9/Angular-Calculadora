<div class="form-box">
  <div class="header">
    <h2>CALCULADORA</h2>

    <button class="theme-toggle" (click)="toggleTheme()">
      {{ darkMode() ? '☀️' : '🌙' }}
    </button>
  </div>

  <label for="numero1">Número 1</label>
  <input type="number" id="numero1" [value]="numero1()" (input)="numero1.set(+$any($event.target).value)" />

  <!-- BOTÕES DE OPERAÇÃO -->
  <div class="operators">
    <button [class.active]="operacao() === '+'" (click)="operacao.set('+')">+</button>
    <button [class.active]="operacao() === '-'" (click)="operacao.set('-')">-</button>
    <button [class.active]="operacao() === '*'" (click)="operacao.set('*')">×</button>
    <button [class.active]="operacao() === '/'" (click)="operacao.set('/')">÷</button>
  </div>

  <label for="numero2">Número 2</label>
  <input type="number" id="numero2" [value]="numero2()" (input)="numero2.set(+$any($event.target).value)" />

  <div class="result-display">
    <p>Resultado: {{ resultado() }}</p>
  </div>
</div>
